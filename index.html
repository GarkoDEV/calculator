<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Calculadora Android</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

:root {
    color-scheme: light;
    --bg: #f6f0ff;
    --surface: #ffffff;
    --surface-2: #ece6f0;
    --surface-3: #e7def8;
    --primary: #6750a4;
    --primary-container: #eaddff;
    --secondary-container: #dfe2eb;
    --accent: #4f378b;
    --text: #1d1b20;
    --text-muted: #625b71;
    --success: #386a20;
    --danger: #b3261e;
    --shadow: 0 16px 40px rgba(50, 35, 90, 0.14);
    --border: rgba(103, 80, 164, 0.12);
    --display-size: clamp(2.6rem, 8vw, 4.8rem);
    --display-small: clamp(1rem, 2.8vw, 1.2rem);
    --button-size: clamp(3.7rem, 11vw, 4.6rem);
}

body.dark {
    color-scheme: dark;
    --bg: #141218;
    --surface: #1d1b20;
    --surface-2: #2b2930;
    --surface-3: #332d41;
    --primary: #d0bcff;
    --primary-container: #4f378b;
    --secondary-container: #3a3f48;
    --accent: #d0bcff;
    --text: #e6e1e5;
    --text-muted: #cac4d0;
    --success: #9ddb7c;
    --danger: #f2b8b5;
    --shadow: 0 20px 48px rgba(0, 0, 0, 0.38);
    --border: rgba(208, 188, 255, 0.14);
}

body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: Roboto, "Segoe UI", sans-serif;
    background:
        radial-gradient(circle at top, rgba(103, 80, 164, 0.2), transparent 38%),
        radial-gradient(circle at bottom, rgba(103, 80, 164, 0.08), transparent 42%),
        var(--bg);
    color: var(--text);
    padding:
        max(14px, env(safe-area-inset-top))
        14px
        max(14px, env(safe-area-inset-bottom));
}

.app {
    width: min(100%, 440px);
    min-height: min(100dvh - 28px, 860px);
    display: grid;
}

.calculator {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    width: 100%;
    position: relative;
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 28%),
        var(--surface);
    border: 1px solid var(--border);
    border-radius: 32px;
    box-shadow: var(--shadow);
    overflow: hidden;
}

.calculator::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at top center, rgba(255, 255, 255, 0.35), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 20%);
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 18px 18px 12px;
}

.chip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.icon-button,
.mode-button {
    border: none;
    cursor: pointer;
    color: var(--text);
    background: var(--surface-2);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 8px 18px rgba(103, 80, 164, 0.08);
    transition: transform 0.16s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.icon-button {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    font-size: 1.1rem;
}

.mode-button {
    min-height: 48px;
    padding: 0 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    font-weight: 600;
}

.mode-button.active {
    background: var(--primary-container);
    color: var(--accent);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 10px 24px rgba(103, 80, 164, 0.16);
}

.icon-button:active,
.mode-button:active,
.key:active {
    transform: scale(0.97);
}

.display {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 10px;
    min-height: 220px;
    padding: 14px 20px 24px;
    background:
        linear-gradient(180deg, rgba(103, 80, 164, 0.08), transparent 65%);
}

.display-meta {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    color: var(--text-muted);
    font-size: 0.92rem;
}

.angle-badge {
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-weight: 600;
}

.expression,
.result {
    width: 100%;
    text-align: right;
    overflow-x: auto;
    scrollbar-width: none;
}

.expression::-webkit-scrollbar,
.result::-webkit-scrollbar {
    display: none;
}

.expression {
    min-height: 1.6em;
    color: var(--text-muted);
    font-size: var(--display-small);
}

.result {
    min-height: 1.15em;
    font-size: var(--display-size);
    font-weight: 300;
    letter-spacing: -0.04em;
}

.history {
    max-height: 0;
    overflow: auto;
    border-top: 1px solid transparent;
    background: linear-gradient(180deg, rgba(103, 80, 164, 0.05), transparent), var(--surface-2);
    transition: max-height 0.24s ease, border-color 0.24s ease, padding 0.24s ease;
}

.history.open {
    max-height: 180px;
    border-top-color: var(--border);
}

.history-item,
.history-empty {
    padding: 12px 18px;
    font-size: 0.95rem;
}

.history-item + .history-item {
    border-top: 1px solid var(--border);
}

.history-empty {
    color: var(--text-muted);
}

.scientific-panel {
    padding: 0 18px 14px;
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.24s ease;
}

.scientific-panel.open {
    grid-template-rows: 1fr;
}

.scientific-inner {
    overflow: hidden;
}

.scientific-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    padding-top: 4px;
}

.keyboard {
    padding: 0 18px 18px;
}

.basic-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
}

.key {
    min-width: 0;
    height: var(--button-size);
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-size: clamp(1rem, 3.4vw, 1.4rem);
    font-weight: 600;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 10px 20px rgba(40, 30, 70, 0.08);
    transition: transform 0.16s ease, filter 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.key:hover {
    filter: brightness(1.02);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        0 12px 24px rgba(40, 30, 70, 0.11);
}

.key.number {
    background: var(--surface-2);
    color: var(--text);
}

.key.operator {
    background: var(--primary-container);
    color: var(--accent);
}

.key.function {
    background: var(--secondary-container);
    color: var(--text);
    font-size: clamp(0.92rem, 2.7vw, 1.06rem);
}

.key.equal {
    background: linear-gradient(180deg, #7b61c9, var(--primary));
    color: #ffffff;
}

.key.danger {
    color: var(--danger);
}

.key.success {
    color: var(--success);
}

.span-2 {
    grid-column: span 2;
}

@media (max-width: 560px) {
    body {
        padding: 0;
    }

    .app {
        width: 100%;
        min-height: 100dvh;
    }

    .calculator {
        min-height: 100dvh;
        border-radius: 0;
        border: none;
        box-shadow: none;
    }

    .topbar {
        padding-top: max(18px, env(safe-area-inset-top));
    }
}

@media (max-width: 380px) {
    .topbar {
        flex-direction: column;
        align-items: stretch;
    }

    .chip-row {
        justify-content: space-between;
    }

    .scientific-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
    }
}
</style>
</head>
<body>
<main class="app">
    <section class="calculator" aria-label="Calculadora Android">
        <header class="topbar">
            <div class="chip-row">
                <button id="themeBtn" class="icon-button" type="button" aria-label="Cambiar tema">◐</button>
                <button id="historyBtn" class="icon-button" type="button" aria-label="Mostrar historial">🕘</button>
            </div>
            <div class="chip-row">
                <button id="simpleBtn" class="mode-button active" type="button">Simple</button>
                <button id="scienceBtn" class="mode-button" type="button">Científica</button>
            </div>
        </header>

        <section class="display" aria-live="polite">
            <div class="display-meta">
                <span class="angle-badge">DEG</span>
            </div>
            <div id="expression" class="expression"></div>
            <div id="result" class="result">0</div>
        </section>

        <section id="history" class="history" aria-label="Historial"></section>

        <section id="scientificPanel" class="scientific-panel" aria-label="Panel científico">
            <div class="scientific-inner">
                <div class="scientific-grid">
                    <button class="key function" type="button" data-action="function" data-value="sin">sin</button>
                    <button class="key function" type="button" data-action="function" data-value="cos">cos</button>
                    <button class="key function" type="button" data-action="function" data-value="tan">tan</button>
                    <button class="key function" type="button" data-action="function" data-value="log">log</button>
                    <button class="key function" type="button" data-action="function" data-value="ln">ln</button>

                    <button class="key function" type="button" data-action="function" data-value="sqrt">√x</button>
                    <button class="key function" type="button" data-action="function" data-value="pow2">x²</button>
                    <button class="key function" type="button" data-action="function" data-value="pow">xʸ</button>
                    <button class="key function" type="button" data-action="function" data-value="inv">1/x</button>
                    <button class="key function" type="button" data-action="function" data-value="factorial">x!</button>

                    <button class="key function" type="button" data-action="constant" data-value="PI">π</button>
                    <button class="key function" type="button" data-action="constant" data-value="E">e</button>
                    <button class="key function" type="button" data-action="function" data-value="percent">%</button>
                    <button class="key function" type="button" data-action="function" data-value="abs">|x|</button>
                    <button class="key function" type="button" data-action="backspace">⌫</button>
                </div>
            </div>
        </section>

        <section class="keyboard" aria-label="Teclado principal">
            <div class="basic-grid">
                <button class="key function danger" type="button" data-action="clear">AC</button>
                <button class="key function" type="button" data-action="sign">±</button>
                <button class="key function" type="button" data-action="backspace">⌫</button>
                <button class="key operator" type="button" data-action="operator" data-value="/">÷</button>

                <button class="key number" type="button" data-action="digit" data-value="7">7</button>
                <button class="key number" type="button" data-action="digit" data-value="8">8</button>
                <button class="key number" type="button" data-action="digit" data-value="9">9</button>
                <button class="key operator" type="button" data-action="operator" data-value="*">×</button>

                <button class="key number" type="button" data-action="digit" data-value="4">4</button>
                <button class="key number" type="button" data-action="digit" data-value="5">5</button>
                <button class="key number" type="button" data-action="digit" data-value="6">6</button>
                <button class="key operator" type="button" data-action="operator" data-value="-">−</button>

                <button class="key number" type="button" data-action="digit" data-value="1">1</button>
                <button class="key number" type="button" data-action="digit" data-value="2">2</button>
                <button class="key number" type="button" data-action="digit" data-value="3">3</button>
                <button class="key operator" type="button" data-action="operator" data-value="+">+</button>

                <button class="key number span-2" type="button" data-action="digit" data-value="0">0</button>
                <button class="key number" type="button" data-action="decimal" data-value=".">.</button>
                <button class="key equal success" type="button" data-action="equals">=</button>
            </div>
        </section>
    </section>
</main>

<script>
class Calculator {
    constructor() {
        this.expressionEl = document.getElementById("expression");
        this.resultEl = document.getElementById("result");
        this.historyEl = document.getElementById("history");
        this.scientificPanel = document.getElementById("scientificPanel");
        this.simpleBtn = document.getElementById("simpleBtn");
        this.scienceBtn = document.getElementById("scienceBtn");
        this.themeBtn = document.getElementById("themeBtn");
        this.historyBtn = document.getElementById("historyBtn");

        this.history = [];
        this.isScientific = false;
        this.resetAll();
        this.restoreTheme();
        this.bindEvents();
        this.render();
    }

    resetAll() {
        this.current = "0";
        this.previous = "";
        this.operator = "";
        this.justEvaluated = false;
        this.render();
    }

    bindEvents() {
        document.querySelectorAll("[data-action]").forEach((button) => {
            button.addEventListener("click", () => this.handleAction(button.dataset.action, button.dataset.value));
        });

        this.simpleBtn.addEventListener("click", () => this.setMode(false));
        this.scienceBtn.addEventListener("click", () => this.setMode(true));
        this.historyBtn.addEventListener("click", () => this.historyEl.classList.toggle("open"));
        this.themeBtn.addEventListener("click", () => this.toggleTheme());

        document.addEventListener("keydown", (event) => this.handleKeydown(event));
    }

    handleAction(action, value) {
        this.vibrate();

        switch (action) {
            case "digit":
                this.appendDigit(value);
                break;
            case "decimal":
                this.appendDecimal();
                break;
            case "operator":
                this.setOperator(value);
                break;
            case "equals":
                this.evaluate();
                break;
            case "clear":
                this.resetAll();
                break;
            case "sign":
                this.toggleSign();
                break;
            case "backspace":
                this.backspace();
                break;
            case "function":
                this.applyFunction(value);
                break;
            case "constant":
                this.insertConstant(value);
                break;
            default:
                break;
        }
    }

    handleKeydown(event) {
        const { key } = event;

        if (/^[0-9]$/.test(key)) {
            event.preventDefault();
            this.appendDigit(key);
            return;
        }

        if (key === "." || key === ",") {
            event.preventDefault();
            this.appendDecimal();
            return;
        }

        if (["+", "-", "*", "/"].includes(key)) {
            event.preventDefault();
            this.setOperator(key);
            return;
        }

        if (key === "Enter" || key === "=") {
            event.preventDefault();
            this.evaluate();
            return;
        }

        if (key === "Backspace") {
            event.preventDefault();
            this.backspace();
            return;
        }

        if (key === "Escape" || key.toLowerCase() === "c") {
            event.preventDefault();
            this.resetAll();
        }
    }

    appendDigit(digit) {
        if (this.justEvaluated && !this.operator) {
            this.current = "0";
            this.justEvaluated = false;
        }

        if (this.current === "0") {
            this.current = digit;
        } else {
            this.current += digit;
        }

        this.render();
    }

    appendDecimal() {
        if (this.justEvaluated && !this.operator) {
            this.current = "0";
            this.justEvaluated = false;
        }

        if (!this.current.includes(".")) {
            this.current += this.current ? "." : "0.";
        }

        this.render();
    }

    setOperator(nextOperator) {
        if (this.current === "Error") {
            return;
        }

        if (this.previous && this.operator && !this.justEvaluated) {
            this.evaluate();
            if (this.current === "Error") {
                return;
            }
        }

        this.previous = this.current;
        this.operator = nextOperator;
        this.current = "0";
        this.justEvaluated = false;
        this.render();
    }

    evaluate() {
        if (!this.operator || this.previous === "") {
            return;
        }

        const a = Number(this.previous);
        const b = Number(this.current);

        if (!Number.isFinite(a) || !Number.isFinite(b)) {
            this.showError();
            return;
        }

        let result;

        switch (this.operator) {
            case "+":
                result = a + b;
                break;
            case "-":
                result = a - b;
                break;
            case "*":
                result = a * b;
                break;
            case "/":
                result = b === 0 ? NaN : a / b;
                break;
            case "^":
                result = Math.pow(a, b);
                break;
            default:
                return;
        }

        if (!Number.isFinite(result)) {
            this.showError();
            return;
        }

        const expressionText = `${this.formatNumber(a)} ${this.operatorSymbol(this.operator)} ${this.formatNumber(b)}`;
        const resultText = this.formatNumber(result);
        this.pushHistory(`${expressionText} = ${resultText}`);

        this.current = this.normalizeNumber(result);
        this.previous = "";
        this.operator = "";
        this.justEvaluated = true;
        this.render();
    }

    applyFunction(name) {
        const value = Number(this.current);

        if (!Number.isFinite(value)) {
            this.showError();
            return;
        }

        if (name === "pow") {
            this.setOperator("^");
            return;
        }

        let result;
        let label = "";

        switch (name) {
            case "sin":
                result = Math.sin(this.toRadians(value));
                label = `sin(${this.formatNumber(value)})`;
                break;
            case "cos":
                result = Math.cos(this.toRadians(value));
                label = `cos(${this.formatNumber(value)})`;
                break;
            case "tan":
                result = Math.tan(this.toRadians(value));
                label = `tan(${this.formatNumber(value)})`;
                break;
            case "log":
                result = value <= 0 ? NaN : Math.log10(value);
                label = `log(${this.formatNumber(value)})`;
                break;
            case "ln":
                result = value <= 0 ? NaN : Math.log(value);
                label = `ln(${this.formatNumber(value)})`;
                break;
            case "sqrt":
                result = value < 0 ? NaN : Math.sqrt(value);
                label = `√(${this.formatNumber(value)})`;
                break;
            case "pow2":
                result = Math.pow(value, 2);
                label = `(${this.formatNumber(value)})²`;
                break;
            case "inv":
                result = value === 0 ? NaN : 1 / value;
                label = `1/(${this.formatNumber(value)})`;
                break;
            case "factorial":
                result = this.factorial(value);
                label = `(${this.formatNumber(value)})!`;
                break;
            case "abs":
                result = Math.abs(value);
                label = `|${this.formatNumber(value)}|`;
                break;
            case "percent":
                result = value / 100;
                label = `${this.formatNumber(value)}%`;
                break;
            default:
                return;
        }

        if (!Number.isFinite(result)) {
            this.showError();
            return;
        }

        this.pushHistory(`${label} = ${this.formatNumber(result)}`);
        this.current = this.normalizeNumber(result);
        this.justEvaluated = true;
        this.render(label);
    }

    insertConstant(name) {
        const constants = {
            PI: Math.PI,
            E: Math.E
        };

        const nextValue = constants[name];

        if (!Number.isFinite(nextValue)) {
            return;
        }

        this.current = this.normalizeNumber(nextValue);
        this.justEvaluated = true;
        this.render(name === "PI" ? "π" : "e");
    }

    toggleSign() {
        if (this.current === "0" || this.current === "Error") {
            return;
        }

        this.current = this.current.startsWith("-")
            ? this.current.slice(1)
            : `-${this.current}`;
        this.render();
    }

    backspace() {
        if (this.justEvaluated) {
            this.current = "0";
            this.justEvaluated = false;
            this.render();
            return;
        }

        if (this.current.length <= 1 || (this.current.length === 2 && this.current.startsWith("-"))) {
            this.current = "0";
        } else {
            this.current = this.current.slice(0, -1);
        }

        this.render();
    }

    setMode(scientific) {
        this.isScientific = scientific;
        this.scientificPanel.classList.toggle("open", scientific);
        this.simpleBtn.classList.toggle("active", !scientific);
        this.scienceBtn.classList.toggle("active", scientific);
    }

    toggleTheme() {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("calculator-theme", isDark ? "dark" : "light");
    }

    restoreTheme() {
        if (localStorage.getItem("calculator-theme") === "dark") {
            document.body.classList.add("dark");
        }
    }

    pushHistory(entry) {
        this.history.unshift(entry);
        this.history = this.history.slice(0, 12);
        this.renderHistory();
    }

    renderHistory() {
        if (!this.history.length) {
            this.historyEl.innerHTML = '<div class="history-empty">Todavía no hay operaciones guardadas.</div>';
            return;
        }

        this.historyEl.innerHTML = this.history
            .map((item) => `<div class="history-item">${item}</div>`)
            .join("");
    }

    render(temporaryExpression = "") {
        if (temporaryExpression) {
            this.expressionEl.textContent = temporaryExpression;
        } else if (this.operator && this.previous !== "") {
            this.expressionEl.textContent = `${this.formatNumber(this.previous)} ${this.operatorSymbol(this.operator)}`;
        } else {
            this.expressionEl.textContent = "";
        }

        this.resultEl.textContent = this.current === "Error"
            ? "Error"
            : this.formatNumber(this.current);
    }

    showError() {
        this.current = "Error";
        this.previous = "";
        this.operator = "";
        this.justEvaluated = true;
        this.render();
    }

    toRadians(value) {
        return value * Math.PI / 180;
    }

    factorial(value) {
        if (!Number.isInteger(value) || value < 0 || value > 170) {
            return NaN;
        }

        let result = 1;

        for (let i = 2; i <= value; i += 1) {
            result *= i;
        }

        return result;
    }

    normalizeNumber(value) {
        if (!Number.isFinite(value)) {
            return "Error";
        }

        const rounded = Number.parseFloat(value.toFixed(10));
        return String(rounded);
    }

    formatNumber(value) {
        if (value === "" || value === undefined || value === null) {
            return "";
        }

        if (value === "Error") {
            return "Error";
        }

        const stringValue = String(value);

        if (/[a-zA-Z]/.test(stringValue)) {
            return stringValue;
        }

        const numeric = Number(stringValue);

        if (!Number.isFinite(numeric)) {
            return stringValue;
        }

        const [integerPart, decimalPart] = stringValue.split(".");
        const formattedInteger = Number(integerPart).toLocaleString("es-ES");
        return decimalPart !== undefined ? `${formattedInteger}.${decimalPart}` : formattedInteger;
    }

    operatorSymbol(operator) {
        const symbols = {
            "+": "+",
            "-": "−",
            "*": "×",
            "/": "÷",
            "^": "^"
        };

        return symbols[operator] || operator;
    }

    vibrate() {
        if (navigator.vibrate) {
            navigator.vibrate(8);
        }
    }
}

const calculator = new Calculator();
calculator.renderHistory();
</script>
