<script>

class Calculadora{

    constructor(){

        this.actualEl=
            document.getElementById("actual");

        this.previoEl=
            document.getElementById("previo");

        this.historialEl=
            document.getElementById("historial");

        this.historial=[];

        this.limpiar();

    }

    vibrar(){

        if(navigator.vibrate){

            navigator.vibrate(8);

        }

    }

    limpiar(){

        this.valorActual="0";

        this.valorPrevio="";

        this.operador=null;

        this.actualizar();

    }

    numero(n){

        this.vibrar();

        n=n.toString();

        if(n==="."
        && this.valorActual.includes(".")){

            return;

        }

        if(this.valorActual==="0"
        && n!=="."){

            this.valorActual=n;

        }

        else{

            this.valorActual+=n;

        }

        this.actualizar();

    }

    operacion(op){

        this.vibrar();

        if(this.valorActual===""){

            return;

        }

        if(this.valorPrevio!==""){

            this.calcular();

        }

        this.operador=op;

        this.valorPrevio=
            this.valorActual;

        this.valorActual="";

        this.actualizar();

    }

    factorial(n){

        if(n<0) return NaN;

        if(n===0) return 1;

        let r=1;

        for(let i=1;i<=n;i++){

            r*=i;

        }

        return r;

    }

    funcion(tipo){

        this.vibrar();

        let n=
            parseFloat(this.valorActual);

        if(isNaN(n)){

            return;

        }

        switch(tipo){

            case "sin":

                n=Math.sin(
                    n*Math.PI/180
                );

                break;

            case "cos":

                n=Math.cos(
                    n*Math.PI/180
                );

                break;

            case "tan":

                n=Math.tan(
                    n*Math.PI/180
                );

                break;

            case "asin":

                n=Math.asin(n)
                    *180/Math.PI;

                break;

            case "acos":

                n=Math.acos(n)
                    *180/Math.PI;

                break;

            case "atan":

                n=Math.atan(n)
                    *180/Math.PI;

                break;

            case "sqrt":

                n=Math.sqrt(n);

                break;

            case "pow2":

                n=Math.pow(n,2);

                break;

            case "log":

                n=Math.log10(n);

                break;

            case "ln":

                n=Math.log(n);

                break;

            case "inv":

                n=1/n;

                break;

            case "factorial":

                n=this.factorial(n);

                break;

            case "abs":

                n=Math.abs(n);

                break;

            case "percent":

                n=n/100;

                break;

            case "exp":

                n=Math.exp(n);

                break;

            case "pow":

                this.operacion("^");

                return;

        }

        this.valorActual=
            n.toString();

        this.actualizar();

    }

    calcular(){

        this.vibrar();

        const a=parseFloat(this.valorPrevio);
        const b=parseFloat(this.valorActual);

        if(
            isNaN(a) ||
            isNaN(b)
        ){
            return;
        }

        let r=0;

        switch(this.operador){

            case "+":

                r=a+b;
                break;

            case "-":

                r=a-b;
                break;

            case "*":

                r=a*b;
                break;

            case "/":

                if(b===0){

                    this.valorActual="Error";

                    this.valorPrevio="";

                    this.operador=null;

                    this.actualizar();

                    return;

                }

                r=a/b;
                break;

            case "^":

                r=Math.pow(a,b);
                break;

            default:

                return;

        }

        const operacionTexto=
            `${this.formatear(this.valorPrevio)}
            ${this.simbolo(this.operador)}
            ${this.formatear(this.valorActual)}
            = ${this.formatear(r.toString())}`;

        this.historial.unshift(
            operacionTexto
        );

        if(this.historial.length>20){

            this.historial.pop();

        }

        this.renderHistorial();

        this.valorActual=
            r.toString();

        this.valorPrevio="";

        this.operador=null;

        this.actualizar();

    }

    cambiarSigno(){

        this.vibrar();

        const n=
            parseFloat(this.valorActual);

        if(isNaN(n)) return;

        this.valorActual=
            (n*-1).toString();

        this.actualizar();

    }

    simbolo(op){

        return{

            "+":"+",
            "-":"−",
            "*":"×",
            "/":"÷",
            "^":"^"

        }[op];

    }

    formatear(n){

        if(n==="") return "";

        if(n==="Error") return "Error";

        const partes=
            n.toString().split(".");

        let entero=
            Number(partes[0]);

        if(isNaN(entero)){

            return n;

        }

        entero=
            entero.toLocaleString(
                "es-ES"
            );

        return partes[1]
            ? entero+"."+partes[1]
            : entero;

    }

    renderHistorial(){

        this.historialEl.innerHTML=
            this.historial
            .map(item=>

                `<div class="historial-item">
                    ${item}
                </div>`

            )
            .join("");

    }

    actualizar(){

        const l=
            this.valorActual.length;

        if(l>12){

            this.actualEl
            .style.fontSize=
            "2rem";

        }

        else if(l>8){

            this.actualEl
            .style.fontSize=
            "3rem";

        }

        else{

            this.actualEl
            .style.fontSize=
            "4rem";

        }

        this.actualEl.innerText=

            this.formatear(
                this.valorActual
            );

        if(this.operador){

            this.previoEl.innerText=

                this.formatear(
                    this.valorPrevio
                )

                +" "+

                this.simbolo(
                    this.operador
                );

        }

        else{

            this.previoEl.innerText="";

        }

    }

}

const calc=
    new Calculadora();

const body=
    document.body;

const themeBtn=
    document.getElementById(
        "themeBtn"
    );

if(

    localStorage.getItem(
        "theme"
    )==="dark"

){

    body.classList.add(
        "dark"
    );

    themeBtn.innerText="☀️";

}

themeBtn.onclick=()=>{

    body.classList.toggle(
        "dark"
    );

    const dark=

        body.classList.contains(
            "dark"
        );

    themeBtn.innerText=

        dark
        ? "☀️"
        : "🌙";

    localStorage.setItem(

        "theme",

        dark
        ? "dark"
        : "light"

    );

};

document
.getElementById(
    "scienceBtn"
)
.onclick=()=>{

    document
    .getElementById(
        "botones"
    )
    .classList
    .toggle(
        "cientifica"
    );

};

document
.getElementById(
    "historyBtn"
)
.onclick=()=>{

    document
    .getElementById(
        "historial"
    )
    .classList
    .toggle(
        "abierto"
    );

};

document
.addEventListener(
    "keydown",
    e=>{

        if(
            "0123456789"
            .includes(e.key)
        ){

            calc.numero(
                e.key
            );

        }

        if(e.key==="."){

            calc.numero(
                "."
            );

        }

        if(

            ["+","-","*","/"]
            .includes(e.key)

        ){

            calc.operacion(
                e.key
            );

        }

        if(
            e.key==="Enter"
        ){

            calc.calcular();

        }

        if(
            e.key==="Escape"
        ){

            calc.limpiar();

        }

        if(
            e.key==="Backspace"
        ){

            calc.valorActual=

                calc.valorActual
                .slice(0,-1)

                ||

                "0";

            calc.actualizar();

        }

    }

);

</script>
