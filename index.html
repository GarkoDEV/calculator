<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderna</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .calculadora {
            background-color: #1e222b;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            width: 350px;
        }

        #pantalla {
            width: 100%;
            height: 70px;
            background-color: #2c313c;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 15px;
            margin-bottom: 20px;
            outline: none;
        }

        .botones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            background-color: #3e4451;
            color: #ffffff;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            opacity: 0.9;
        }

        /* Colores especiales para operadores y acciones */
        button.operador {
            background-color: #ff9f0a;
            color: white;
        }

        button.accion {
            background-color: #acb1b6;
            color: #1e222b;
        }

        button.igual {
            grid-column: span 2;
            background-color: #30d158;
            color: white;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <input type="text" id="pantalla" readonly value="0">

        <div class="botones">
            <button class="accion" onclick="limpiar()">C</button>
            <button class="accion" onclick="borrarUno()">⌫</button>
            <button class="operador" onclick="agregar('/')">÷</button>
            <button class="operador" onclick="agregar('*')">×</button>

            <button onclick="agregar('7')">7</button>
            <button onclick="agregar('8')">8</button>
            <button onclick="agregar('9')">9</button>
            <button class="operador" onclick="agregar('-')">−</button>

            <button onclick="agregar('4')">4</button>
            <button onclick="agregar('5')">5</button>
            <button onclick="agregar('6')">6</button>
            <button class="operador" onclick="agregar('+')">+</button>

            <button onclick="agregar('1')">1</button>
            <button onclick="agregar('2')">2</button>
            <button onclick="agregar('3')">3</button>
            <button onclick="agregar('.')">.</button>

            <button onclick="agregar('0')">0</button>
            <button class="igual" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        const pantalla = document.getElementById('pantalla');

        // Añade el número o símbolo presionado a la pantalla
        function agregar(valor) {
            if (pantalla.value === '0' && valor !== '.') {
                pantalla.value = valor;
            } else {
                pantalla.value += valor;
            }
        }

        // Limpia toda la pantalla (Botón C)
        function limpiar() {
            pantalla.value = '0';
        }

        // Borra el último carácter introducido
        function borrarUno() {
            if (pantalla.value.length > 1) {
                pantalla.value = pantalla.value.slice(0, -1);
            } else {
                pantalla.value = '0';
            }
        }

        // Evalúa la expresión matemática interna
        function calcular() {
            try {
                // eval() procesa el string matemático (ej: "2+5*3") y devuelve el resultado
                pantalla.value = eval(pantalla.value);
            } catch (error) {
                pantalla.value = 'Error';
                setTimeout(limpiar, 1500); // Vuelve a 0 si hay un error
            }
        }
    </script>

<div class="gk-footer">
      © <span id="gk-year"></span> GarkoDEV - Todos los derechos reservados
    </div>
    <script>
        document.getElementById('gk-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
