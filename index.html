<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Calculadora Material You</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

:root{

    --bg:#131314;
    --surface:#1E1F20;
    --surface2:#2A2B2F;

    --text:#E3E3E3;
    --text-secondary:#9AA0A6;

    --operator:#8AB4F8;
    --equal:#81C995;

    --shadow:0 8px 30px rgba(0,0,0,.35);

    --radius:28px;

    --font:Roboto,system-ui,sans-serif;

}

body{

    min-height:100vh;

    background:var(--bg);

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:var(--font);

    padding:
        env(safe-area-inset-top)
        12px
        env(safe-area-inset-bottom);

}

.calculadora{

    width:100%;
    max-width:420px;

    background:var(--surface);

    border-radius:32px;

    overflow:hidden;

    box-shadow:var(--shadow);

    display:flex;
    flex-direction:column;

}

.pantalla{

    min-height:220px;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;

    padding:40px 24px 20px;

}

.valor-previo{

    color:var(--text-secondary);

    font-size:1.2rem;

    text-align:right;

    min-height:30px;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;

}

.valor-actual{

    color:var(--text);

    font-size:4rem;

    font-weight:300;

    text-align:right;

    overflow-x:auto;

    transition:.2s;

}

.valor-actual::-webkit-scrollbar{
    display:none;
}

.botones{

    padding:20px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:14px;

}

button{

    height:72px;

    border:none;

    border-radius:24px;

    font-size:1.6rem;

    font-weight:500;

    color:var(--text);

    cursor:pointer;

    position:relative;

    overflow:hidden;

    transition:
        transform .15s,
        opacity .2s;

}

button:active{

    transform:scale(.95);

}

button::after{

    content:"";

    position:absolute;

    width:120px;
    height:120px;

    background:rgba(255,255,255,.15);

    border-radius:50%;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%) scale(0);

    opacity:0;

}

button:active::after{

    transform:translate(-50%,-50%) scale(2);

    opacity:1;

    transition:.35s;

}

.numero{

    background:var(--surface2);

}

.especial{

    background:#3A3B3F;

}

.operador{

    background:var(--operator);

    color:#000;

}

.igual{

    background:var(--equal);

    color:#000;

}

.cero{

    grid-column:span 2;

}

@media(max-width:480px){

    body{
        padding:0;
        background:var(--surface);
    }

    .calculadora{

        max-width:none;

        min-height:100vh;

        border-radius:0;

        box-shadow:none;

    }

}

</style>

</head>

<body>

<div class="calculadora">

    <div class="pantalla">

        <div id="previo" class="valor-previo"></div>

        <div id="actual" class="valor-actual">0</div>

    </div>

    <div class="botones">

        <button class="especial" onclick="calc.limpiar()">AC</button>
        <button class="especial" onclick="calc.cambiarSigno()">±</button>
        <button class="especial" onclick="calc.porcentaje()">%</button>
        <button class="operador" onclick="calc.operacion('/')">÷</button>

        <button class="numero" onclick="calc.numero('7')">7</button>
        <button class="numero" onclick="calc.numero('8')">8</button>
        <button class="numero" onclick="calc.numero('9')">9</button>
        <button class="operador" onclick="calc.operacion('*')">×</button>

        <button class="numero" onclick="calc.numero('4')">4</button>
        <button class="numero" onclick="calc.numero('5')">5</button>
        <button class="numero" onclick="calc.numero('6')">6</button>
        <button class="operador" onclick="calc.operacion('-')">−</button>

        <button class="numero" onclick="calc.numero('1')">1</button>
        <button class="numero" onclick="calc.numero('2')">2</button>
        <button class="numero" onclick="calc.numero('3')">3</button>
        <button class="operador" onclick="calc.operacion('+')">+</button>

        <button class="numero cero" onclick="calc.numero('0')">0</button>
        <button class="numero" onclick="calc.numero('.')">.</button>
        <button class="igual" onclick="calc.calcular()">=</button>

    </div>

</div>

<script>

class Calculadora{

    constructor(){

        this.actual=document.getElementById("actual");
        this.previo=document.getElementById("previo");

        this.limpiar();

    }

    vibrar(){

        if(navigator.vibrate){

            navigator.vibrate(10);

        }

    }

    limpiar(){

        this.valorActual="0";
        this.valorPrevio="";
        this.operador=null;

        this.actualizar();

    }

    numero(n){

        this.vibrar();

        if(n==="." && this.valorActual.includes(".")) return;

        if(this.valorActual==="0" && n!=="."){

            this.valorActual=n;

        }else{

            this.valorActual+=n;

        }

        this.actualizar();

    }

    operacion(op){

        this.vibrar();

        if(this.valorActual==="") return;

        if(this.valorPrevio!==""){

            this.calcular();

        }

        this.operador=op;
        this.valorPrevio=this.valorActual;
        this.valorActual="";

        this.actualizar();

    }

    calcular(){

        this.vibrar();

        const a=parseFloat(this.valorPrevio);
        const b=parseFloat(this.valorActual);

        if(isNaN(a)||isNaN(b)) return;

        let r=0;

        switch(this.operador){

            case "+":

                r=a+b;
                break;

            case "-":

                r=a-b;
                break;

            case "*":

                r=a*b;
                break;

            case "/":

                if(b===0){

                    this.valorActual="Error";
                    this.valorPrevio="";
                    this.operador=null;

                    this.actualizar();

                    return;

                }

                r=a/b;

        }

        this.valorActual=r.toString();
        this.valorPrevio="";
        this.operador=null;

        this.actualizar();

    }

    cambiarSigno(){

        this.vibrar();

        this.valorActual=(parseFloat(this.valorActual)*-1).toString();

        this.actualizar();

    }

    porcentaje(){

        this.vibrar();

        this.valorActual=(parseFloat(this.valorActual)/100).toString();

        this.actualizar();

    }

    simbolo(op){

        return{

            "+":"+",
            "-":"−",
            "*":"×",
            "/":"÷"

        }[op];

    }

    formatear(n){

        if(n==="") return "";

        if(n==="Error") return "Error";

        let partes=n.toString().split(".");

        let entero=parseFloat(partes[0]);

        if(isNaN(entero)) return n;

        entero=entero.toLocaleString("es-ES");

        return partes[1]
            ? entero+"."+partes[1]
            : entero;

    }

    actualizar(){

        let longitud=this.valorActual.length;

        if(longitud>12){

            this.actual.style.fontSize="2rem";

        }else if(longitud>8){

            this.actual.style.fontSize="3rem";

        }else{

            this.actual.style.fontSize="4rem";

        }

        this.actual.innerText=this.formatear(this.valorActual);

        if(this.operador){

            this.previo.innerText=

                this.formatear(this.valorPrevio)
                +" "
                +this.simbolo(this.operador);

        }else{

            this.previo.innerText="";

        }

    }

}

const calc=new Calculadora();

document.addEventListener("keydown",(e)=>{

    if("0123456789".includes(e.key))
        calc.numero(e.key);

    if(e.key===".")
        calc.numero(".");

    if(["+","-","*","/"].includes(e.key))
        calc.operacion(e.key);

    if(e.key==="Enter")
        calc.calcular();

    if(e.key==="Escape")
        calc.limpiar();

    if(e.key==="Backspace"){

        calc.valorActual=

            calc.valorActual.slice(0,-1)||"0";

        calc.actualizar();

    }

});

</script>

</body>
</html>
